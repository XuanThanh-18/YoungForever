
spring:
  application:
    name: youngforever-api

  # ?? DataSource ???????????????????????????????????????????
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/youngforever_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ?? JPA / Hibernate ??????????????????????????????????????
  jpa:
    hibernate:
      ddl-auto: update          # use Flyway or manual DDL; never auto in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ?? Redis ????????????????????????????????????????????????
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  # ?? Mail ?????????????????????????????????????????????????
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:apikey}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    default-encoding: UTF-8

# ?? App Properties ?????????????????????????????????????????
app:
  jwt:
    secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uWW91bmdGb3JldmVyMjAyNQ==}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}      # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000} # 7 days

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: youngforever

  mail:
    from: no-reply@youngforever.vn
    from-name: YoungForever

  pagination:
    default-page: 0
    default-size: 20
    max-size: 100

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8081
      - https://youngforever.vn
      - https://www.youngforever.vn
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
    hash-secret: ${VNPAY_HASH_SECRET:demosecretkey1234567890abcdef12}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}
    version: "2.1.0"
    command: pay
    curr-code: VND
    order-type: other

    momo:
      partner-code: ${MOMO_PARTNER_CODE:MOMO_ATM_TEST}
      access-key: ${MOMO_ACCESS_KEY:F8BBA842ECF85}
      secret-key: ${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/v1/payments/momo/ipn}
      redirect-url: ${MOMO_REDIRECT_URL:http://localhost:3000/checkout/result}
      partner-name: YoungForever

# ?? Server ?????????????????????????????????????????????????
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024

# ?? Swagger / OpenAPI ??????????????????????????????????????
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: YoungForever API
    version: 1.0.0
    description: Premium Beauty E-Commerce REST API

# ?? Logging ????????????????????????????????????????????????
logging:
  level:
    com.youngforever: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"